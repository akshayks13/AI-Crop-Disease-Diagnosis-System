name: flutter_app
description: "AI-Powered Crop Disease Diagnosis Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  
  # Networking
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  
  # Storage
  flutter_secure_storage: ^9.0.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  
  # Camera & Media
  image_picker: ^1.1.2
  camera: ^0.10.5+9
  photo_view: ^0.15.0
  
  # UI Components
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  carousel_slider: ^5.1.1
  fl_chart: ^0.69.0
  flutter_spinkit: ^5.2.1
  animate_do: ^4.2.0
  introduction_screen: ^4.0.0
  font_awesome_flutter: ^10.7.0
  qr_flutter: ^4.1.0
  
  # Animations
  lottie: ^3.1.2
  rive: ^0.13.4
  
  # Notifications & Toast
  fluttertoast: ^9.0.0
  
  # TTS & Localization
  flutter_tts: ^3.8.5
  intl: ^0.19.0
  
  # Utilities
  uuid: ^4.4.0
  equatable: ^2.0.5
  http: ^1.6.0
  geolocator: ^14.0.2
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/.env
