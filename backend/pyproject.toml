[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
# Ignore specific rules
ignore = [
    "F401",  # Unused imports (we import models to register them with SQLAlchemy)
    "E402",  # Module level import not at top (sometimes needed for circular imports)
]

# Exclude test files and venv
exclude = [
    "venv",
    ".venv",
    "__pycache__",
    "scripts",
]
