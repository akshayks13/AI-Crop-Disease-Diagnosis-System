name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ==================== BACKEND ====================
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff aiosqlite

      - name: Lint with Ruff
        run: ruff check . --output-format=github

      - name: Run tests
        run: pytest -v --tb=short

  # ==================== FLUTTER ====================
  flutter:
    name: Flutter App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/flutter_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  # ==================== ADMIN DASHBOARD ====================
  admin:
    name: Admin Dashboard (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/admin_dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-path: frontend/admin_dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
