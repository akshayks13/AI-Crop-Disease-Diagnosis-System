name: Deploy Flutter Web → Firebase

on:
  push:
    branches: [main]
    paths:
      - "frontend/flutter_app/**"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Flutter Web
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/flutter_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.1"
          channel: "stable"
          cache: true

      # assets/.env is gitignored — recreate it from GitHub secrets
      - name: Create assets/.env
        run: |
          echo "OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}" > assets/.env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> assets/.env

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build Flutter Web
        run: |
          flutter build web --release \
            --dart-define=BASE_URL=${{ secrets.BACKEND_BASE_URL }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          entryPoint: frontend/flutter_app
